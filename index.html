<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>合成水果</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <div class="game-shell">
      <header class="topbar">
        <div>
          <h1 class="title">合成水果</h1>
          <p class="subtitle">点击或触摸上方位置投放水果，相同水果会自动合成</p>
        </div>
        <div class="actions">
          <button id="soundButton" class="control-button" type="button">音效开</button>
          <button id="pauseButton" class="control-button" type="button">暂停</button>
          <button id="restartButton" class="control-button primary" type="button">重新开始</button>
        </div>
      </header>

      <section class="status-panel">
        <div class="score-card">
          <span class="label">当前分数</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div class="score-card">
          <span class="label">最高分</span>
          <strong id="bestScoreValue">0</strong>
        </div>
      </section>

      <section class="game-panel">
        <div class="guide-row">
          <div class="guide-text">拖动或移动指针选择投放位置</div>
          <div id="comboText" class="combo-text">连击 x1</div>
          <div id="gameStateText" class="guide-state">进行中</div>
        </div>
        <div id="gameContainer" class="game-container">
          <canvas id="gameCanvas" width="420" height="680" aria-label="合成水果游戏画布"></canvas>

          <canvas id="dropPreviewCanvas" class="drop-preview-canvas" width="220" height="220" aria-hidden="true"></canvas>
          <div id="landingMarker" class="landing-marker"></div>
          <div id="comboFlash" class="combo-flash"></div>
          <div id="comboBurst" class="combo-burst"></div>
          <div id="dangerLine" class="danger-line"></div>

          <div id="comboBanner" class="combo-banner">GOOD</div>

          <div id="pauseOverlay" class="overlay hidden">

          <div id="pauseOverlay" class="overlay hidden">
            <div class="overlay-card">
              <h2>游戏已暂停</h2>
              <p>点击继续按钮恢复游戏。</p>
              <button id="resumeButton" class="control-button primary" type="button">继续</button>
            </div>
          </div>

          <div id="gameOverOverlay" class="overlay hidden">
            <div class="overlay-card">
              <h2>游戏结束</h2>
              <p>水果堆过警戒线啦，再试一次吧。</p>
              <div class="result-stats">
                <div>本局分数：<strong id="finalScoreValue">0</strong></div>
                <div>最高连击：<strong id="maxComboValue">1</strong></div>
              </div>
              <button id="overlayRestartButton" class="control-button primary" type="button">重新开始</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
