<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>合成水果</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <div class="game-shell">
      <section class="status-panel">
        <button id="settingsButton" class="top-btn" type="button" aria-label="设置/暂停" title="设置/暂停">
          <span aria-hidden="true">⚙</span>
        </button>

        <div class="score-card">
          <span class="label">分数</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div class="score-card">
          <span class="label">最高分</span>
          <strong id="bestScoreValue">0</strong>
        </div>
        <div class="score-card">
          <span class="label">最高连击</span>
          <strong id="topComboValue">1</strong>
          <span id="comboMultiplierBadge" class="combo-badge hidden">x1</span>
        </div>

      </section>

      <div class="sub-bar">
        <button id="collectionBtn" class="sub-btn" type="button">
          🍎 图鉴 <span id="collectionCount">0/10</span>
        </button>
      </div>

      <section class="game-panel">
        <div id="gameContainer" class="game-container">
          <canvas id="gameCanvas" width="420" height="680" aria-label="合成水果游戏画布"></canvas>

          <canvas id="dropPreviewCanvas" class="drop-preview-canvas" width="220" height="220" aria-hidden="true"></canvas>
          <div id="landingMarker" class="landing-marker"></div>
          <div id="comboFlash" class="combo-flash"></div>
          <div id="comboBurst" class="combo-burst"></div>
          <div id="dangerLine" class="danger-line"></div>
          <div id="comboBanner" class="combo-banner">GOOD</div>

          <div id="pauseOverlay" class="overlay hidden">
            <div class="overlay-card">
              <h2>游戏已暂停</h2>
              <p>点击继续按钮恢复游戏。</p>
              <button id="resumeButton" class="control-button primary" type="button">继续</button>
            </div>
          </div>

          <div id="gameOverOverlay" class="overlay hidden">
            <div class="overlay-card">
              <h2>游戏结束</h2>
              <div id="newHighScoreBadge" class="new-highscore-badge hidden">🎉 新纪录！</div>
              <p>水果堆过警戒线啦，再试一次吧。</p>
              <div class="result-stats">
                <div>本局分数：<strong id="finalScoreValue">0</strong></div>
                <div>最高连击：<strong id="maxComboValue">1</strong></div>
              </div>
              <div class="overlay-buttons">
                <button id="overlayRestartButton" class="control-button primary" type="button">重新开始</button>
                <button id="shareButton" class="control-button secondary" type="button">📤 分享</button>
              </div>
            </div>
          </div>

          <div id="settingsOverlay" class="overlay hidden">
            <div class="overlay-card">
              <h2>⚙ 设置</h2>
              <div class="setting-row">
                <span>音效</span>
                <label class="toggle-switch">
                  <input type="checkbox" id="soundToggle" checked>
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="setting-row">
                <span>重置最高分</span>
                <button id="resetScoreButton" class="control-button danger small" type="button">重置</button>
              </div>
              <button id="closeSettingsButton" class="control-button primary" type="button" style="margin-top:18px">关闭</button>
            </div>
          </div>

          <div id="collectionOverlay" class="overlay hidden">
            <div class="overlay-card collection-card">
              <h2>🍎 水果图鉴</h2>
              <div id="collectionGrid" class="collection-grid"></div>
              <button id="closeCollectionButton" class="control-button primary" type="button" style="margin-top:14px">关闭</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
